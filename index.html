<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans','Sarabun',system-ui,sans-serif;background:var(--bg,#F7F1E8);color:var(--ink,#2C1810);line-height:1.6;min-height:100vh}

/* HEADER */
.app-header{background:linear-gradient(135deg,#0d2f2c 0%,#134e49 45%,#1a6860 100%);color:white;padding:36px 24px 30px;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 72% 35%,rgba(255,255,255,0.06) 0%,transparent 55%),radial-gradient(ellipse at 8% 85%,rgba(100,220,200,0.08) 0%,transparent 50%)}
.food-deco{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.food-deco span{position:absolute;font-size:2rem;opacity:.13;filter:blur(1px);user-select:none}
.hi{max-width:1200px;margin:0 auto;position:relative}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;backdrop-filter:blur(4px)}
.htitle{font-family:'IBM Plex Sans','Sarabun',sans-serif;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;line-height:1.15;margin-bottom:6px;letter-spacing:-0.02em}
.hsub{opacity:.82;font-size:.9rem;margin-bottom:20px;font-weight:400}
.hmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mchip{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:5px 13px;font-size:.78rem;font-weight:600;backdrop-filter:blur(4px)}
.lbtn{margin-left:auto;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.32);border-radius:8px;color:white;padding:5px 16px;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .2s;backdrop-filter:blur(4px)}
.lbtn:hover{background:rgba(255,255,255,0.28)}

/* FILTER BAR */
.fbar{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--bord);box-shadow:0 2px 14px rgba(44,24,16,.08)}
.fi{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.flbl{font-size:.70rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap}
.pill{border:1.5px solid var(--bord);border-radius:20px;padding:4px 11px;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .18s;background:transparent;color:var(--ink);white-space:nowrap;font-family:inherit}
.pill:hover{border-color:var(--acc);color:var(--acc)}
.pill.on{background:var(--acc);border-color:var(--acc);color:white}
.sep{width:1px;height:26px;background:var(--bord);flex-shrink:0}
.srt{border:1.5px solid var(--bord);border-radius:8px;padding:5px 9px;font-size:.80rem;background:transparent;color:var(--ink);cursor:pointer;outline:none;font-family:inherit}
.vbtn{border:1.5px solid var(--bord);border-radius:8px;padding:5px 10px;font-size:.88rem;background:transparent;color:var(--ink);cursor:pointer;transition:all .18s;font-family:inherit;line-height:1}
.vbtn.on{background:var(--ink);color:white;border-color:var(--ink)}
.wbtn{background:var(--acc);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:.80rem;font-weight:600;cursor:pointer;transition:opacity .18s;white-space:nowrap;font-family:inherit}
.wbtn:hover{opacity:.85}

/* WEIGHT PANEL */
.wpanel{background:var(--surf);border-bottom:1px solid var(--bord)}
.wi{max-width:1200px;margin:0 auto;padding:18px 20px}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.witem label{display:block;font-size:.70rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.wval{float:right;font-size:.88rem;font-weight:700;color:var(--acc)}
.wslide{width:100%;cursor:pointer;margin-bottom:4px;accent-color:var(--acc)}
.wfoot{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:10px}
.wreset{background:none;border:1.5px solid var(--bord);border-radius:6px;padding:4px 12px;font-size:.76rem;color:var(--muted);cursor:pointer;font-family:inherit}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:22px 20px}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:16px}
.rcard{background:var(--card);border:1.5px solid var(--bord);border-radius:16px;padding:20px;cursor:pointer;transition:box-shadow .22s,transform .22s,border-color .22s}

.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}

.r2{background:linear-gradient(135deg,#A0A8B0,#7888A0)}
.r3{background:linear-gradient(135deg,#CD7F32,#A86020)}
.rn{background:var(--bord);color:var(--muted)}
.cscore{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:800;line-height:1;color:var(--acc)}
.csdenom{font-size:.82rem;font-weight:400;color:var(--muted);margin-left:2px}
.cname{font-family:'Playfair Display','Sarabun',serif;font-size:1.08rem;font-weight:700;line-height:1.3;margin-bottom:2px}
.ctype{font-size:.76rem;color:var(--muted);margin-bottom:11px}
.cmeta{display:flex;gap:10px;margin-bottom:13px;flex-wrap:wrap}
.cmi{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--muted)}

.sbk{display:flex;flex-direction:column;gap:4px}
.srow{display:flex;align-items:center;gap:7px}
.srlab{width:52px;font-size:.66rem;text-transform:capitalize;color:var(--muted);flex-shrink:0}
.srval{width:26px;text-align:right;font-size:.68rem;font-weight:600;color:var(--ink)}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.tchip{font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:10px}

/* TABLE */

table{width:100%;border-collapse:collapse;background:var(--card);font-size:.82rem}
thead{background:var(--ink);color:white}
thead th{padding:11px 10px;text-align:left;font-size:.70rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;user-select:none}

tbody tr{border-bottom:1px solid var(--bord);cursor:pointer;transition:background .15s}

tbody tr:last-child{border-bottom:none}

.trk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.76rem;color:white}
.tscore{font-weight:800;font-size:1rem;color:var(--acc)}
.barcell{display:flex;flex-direction:column;gap:2px;min-width:70px}

/* MAGAZINE */
.mag3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:22px}
.mcard{background:var(--card);border-radius:16px;border:1.5px solid var(--bord);padding:22px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}

.mcard.gold{border-color:#D4A043;border-width:2px}
.mnum{font-family:'Playfair Display',serif;font-size:5rem;font-weight:800;line-height:1;color:var(--acc);opacity:.1;position:absolute;top:6px;right:14px}
.mname{font-family:'Playfair Display','Sarabun',serif;font-size:1.3rem;font-weight:800;line-height:1.2;margin-bottom:5px}
.mlist{display:flex;flex-direction:column;gap:8px}
.mli{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--bord);border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .18s}

.evidence{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin:22px 0}

.evlist{margin:8px 0 0 18px;font-size:.82rem;color:var(--ink)}

.kpi{background:var(--surf);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--bord)}
.kpin{font-size:1.35rem;font-weight:800;color:var(--acc);line-height:1}
.kpil{font-size:.72rem;color:var(--muted);margin-top:4px}

.msec{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:16px 0 9px}
.mscrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}

.mscfil{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

.pd{color:#5C7A3E;font-weight:700;font-size:.95rem;flex-shrink:0}
.cd{color:#C4673A;font-weight:700;font-size:.95rem;flex-shrink:0}
.sentbar{display:flex;height:9px;border-radius:5px;overflow:hidden;margin-top:6px}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:1rem}

@media(max-width:640px){.cgrid{grid-template-columns:1fr}.pc{grid-template-columns:1fr}}

// ─── TWEAKS PANEL ────────────────────────────────────────────
function useTweaks(defaults) {
  const [state, setState] = React.useState({ ...defaults });
  const set = (key, value) => setState((prev) => ({ ...prev, [key]: value }));
  return [state, set];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ position:'fixed',bottom:20,right:20,zIndex:999,fontFamily:"'IBM Plex Sans','Sarabun',system-ui,sans-serif" }}>
      {open && (
        <div style={{ background:'var(--card,#FEFCF8)',border:'1.5px solid var(--bord,#DDD0BE)',borderRadius:14,padding:'14px 18px',marginBottom:10,minWidth:220,boxShadow:'0 8px 32px rgba(44,24,16,.18)' }}>
          <div style={{ fontSize:'.70rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--muted,#8A7468)',marginBottom:12 }}>⚙️ Settings</div>
          {children}
        </div>
      )}
      <button onClick={() => setOpen((o) => !o)} title="Toggle settings"
        style={{ width:42,height:42,borderRadius:'50%',border:'1.5px solid var(--bord,#DDD0BE)',background:open?'var(--acc,#C4673A)':'var(--card,#FEFCF8)',color:open?'white':'var(--ink,#2C1810)',fontSize:'1.1rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(44,24,16,.14)',marginLeft:'auto',transition:'background .2s,color .2s' }}>
        {open ? '✕' : '⚙️'}
      </button>
    </div>
  );
}

function TweakSection({ label }) {
  return (
    <div style={{ fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--muted,#8A7468)',margin:'12px 0 6px',borderTop:'1px solid var(--bord,#DDD0BE)',paddingTop:10 }}>
      {label}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => typeof o === 'string' ? { label: o, value: o } : o);
  return (
    <div style={{ marginBottom:10 }}>
      {label && <div style={{ fontSize:'.72rem',color:'var(--muted,#8A7468)',marginBottom:5 }}>{label}</div>}
      <div style={{ display:'flex',flexWrap:'wrap',gap:5 }}>
        {opts.map((o) => {
          const active = o.value === value;
          return (
            <button key={o.value} onClick={() => onChange(o.value)}
              style={{ border:`1.5px solid ${active?'var(--acc,#C4673A)':'var(--bord,#DDD0BE)'}`,borderRadius:20,padding:'3px 11px',fontSize:'.74rem',fontWeight:active?700:500,cursor:'pointer',background:active?'var(--acc,#C4673A)':'transparent',color:active?'white':'var(--ink,#2C1810)',fontFamily:'inherit',transition:'all .15s' }}>
              {o.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}
</script>

const SHEET_ID = '1QGKpS8ynD7-_PLnXQZORxgC7ovRcUO2Q5LeTHz3aqQU';

async function fetchFromSheets() {
  // Row 30+ = n8n-appended real restaurants; headers=0 so row 30 is row[0]
  // Range extended to T200 to include area column (col T = index 19)
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Clean%20Data&range=A30:T200&headers=0`;
  const res = await fetch(url);
  const text = await res.text();
  // Strip JSONP wrapper: /*O_o*/ google.visualization.Query.setResponse({...});
  const raw = text.replace(/^[^(]+\(/, '').replace(/\);\s*$/, '');
  const json = JSON.parse(raw);
  const rows = json.table.rows;

  return rows
    .filter(row => row.c && row.c[1]?.v)
    .map((row, idx) => {
      const g = (i) => row.c?.[i]?.v ?? null;
      const name      = String(g(1) || '');
      const typeEn    = String(g(2) || '');
      const rating    = parseFloat(g(3))  || 0;
      const reviews   = parseFloat(g(4))  || 0;
      const price     = parseFloat(g(5))  || 200;
      const bts       = parseFloat(g(6))  || 5;
      const grp       = String(g(7)       || 'good');
      const mapsUrl   = g(18) ? String(g(18)) : `https://maps.google.com/?q=${encodeURIComponent(name + ' Asok Bangkok')}`;

      let cuisine = 'mixed';
      const t = typeEn.toLowerCase();
      if (t.includes('thai') || t.includes('seafood')) cuisine = 'thai';
      else if (t.includes('japanese') || t.includes('ramen') || t.includes('sushi') || t.includes('izakaya')) cuisine = 'japanese';
      else if (t.includes('korean')) cuisine = 'korean';
      else if (t.includes('chinese') || t.includes('dim sum')) cuisine = 'chinese';
      else if (t.includes('italian') || t.includes('western') || t.includes('steak') || t.includes('pizza')) cuisine = 'western';

      const pl = price <= 150 ? 1 : price <= 350 ? 2 : price <= 600 ? 3 : 4;

      const prosRaw = String(g(16) || '');
      const consRaw = String(g(17) || '');
      const pros = prosRaw.split(/[|\n]/).map(s => s.trim()).filter(Boolean);
      const cons = consRaw.split(/[|\n]/).map(s => s.trim()).filter(Boolean);

      return {
        id: idx + 1,
        name,
        cuisine,
        typeTh: typeEn,
        typeEn,
        rating,
        rev: reviews,
        price,
        pl,
        bts,
        grp,
        rs: {
          rating: parseFloat(g(8))  || 0,
          group:  parseFloat(g(9))  || 0,
          price:  parseFloat(g(10)) || 0,
          travel: parseFloat(g(11)) || 0,
          data:   parseFloat(g(12)) || 0,
          unique: parseFloat(g(13)) || 0,
        },
        prosTh: pros.length ? pros : [`Rating ${rating}★`],
        prosEn: pros.length ? pros : [`Rating ${rating}★`],
        consTh: cons.length ? cons : ['โปรดตรวจสอบข้อมูลก่อนเยี่ยม'],
        consEn: cons.length ? cons : ['Please verify details before visiting'],
        hlTh: String(g(15) || ''),
        hlEn: String(g(15) || ''),
        sent: { p: Math.min(95, Math.round(55 + rating * 8)), n: 20, neg: 10 },
        url: mapsUrl,
        area: String(g(19) || 'asok')   // col T = area (thonglor/siam/ari/promphong/asok)
      };
    });
}

    if (/งาน|work|ประชุม|meeting|เงียบ/.test(ql)) {
      const r = sorted.find((r)=>['Greyhound Café Exchange','Ootoya Exchange Tower','S&P Restaurant อโศก'].some(n=>r.name.includes(n.split(' ')[0]))) || sorted[0];
      return tx(lang,`เหมาะคุยงานที่สุด: **${r.name}** บรรยากาศเงียบ เหมาะประชุม`,`Best for work meals: **${r.name}** — quiet atmosphere, great for meetings`);
    }
    return tx(lang,`จากข้อมูล ${data.length} ร้านในย่านอโศก — แนะนำ **${sorted[0]?.name}** (${sorted[0]?.sc} pts) เป็นอันดับ 1 ใช้ปุ่ม Filter ด้านบนเพื่อปรับเกณฑ์`,`From ${data.length} restaurants in Asok — top pick: **${sorted[0]?.name}** (${sorted[0]?.sc} pts). Use filters above to narrow down.`);
  };

  const ask = async (question) => {
    if (!question.trim()) return;
    setQ(question);
    setLoading(true);
    setAnswer(null);
    try {
      if (window.claude?.complete) {
        const ctxStr = data.map((r)=>{const sc=score(r,weights);return `${r.name} (${r.typeTh}): คะแนน ${sc}/100, ฿${r.price}/คน, ${r.rating}★, BTS ${r.bts}นาที`;}).join('\n');
        const prompt = `You are a concise food assistant for a Bangkok office team in Asok area. Answer in ${lang==='th'?'Thai':'English'} using ONLY this data:\n\n${ctxStr}\n\nQuestion: ${question}\n\nAnswer specifically, mention restaurant names, max 2-3 sentences.`;
        const resp = await window.claude.complete(prompt);
        setAnswer(resp);
      } else {
        await new Promise((r) => setTimeout(r, 600));
        setAnswer(ruleAnswer(question));
      }
    } catch (e) {
      setAnswer(ruleAnswer(question));
    }
    setLoading(false);
  };

  const SUGGESTIONS = [
    { th:'ร้านไหนถูกที่สุด?',      en:'Which is cheapest?' },
    { th:'ใกล้ BTS ที่สุด?',        en:'Closest to BTS?' },
    { th:'เหมาะกลุ่ม 12 คน?',       en:'Fits 12 people?' },
    { th:'อาหารทะเลที่ดีที่สุด?',  en:'Best seafood?' }
  ];

  const fmt = (text) => {
    if (!text) return null;
    const parts = text.split(/\*\*(.*?)\*\*/);
    return parts.map((p, i) => i%2===1 ? <strong key={i} style={{ color:'var(--acc)' }}>{p}</strong> : p);
  };

  return (
    <div style={{ background:'var(--card)',border:'1.5px solid var(--bord)',borderRadius:16,marginBottom:22,overflow:'hidden' }}>
      <div onClick={() => setOpen((o) => !o)}
        style={{ display:'flex',alignItems:'center',gap:10,padding:'14px 20px',cursor:'pointer',borderBottom:open?'1px solid var(--bord)':'none' }}>
        <span style={{ fontSize:'1.1rem' }}>🤖</span>
        <span style={{ fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'1rem' }}>
          {tx(lang,'ถามข้อมูลร้านอาหาร (AI Ask Box)','Ask About Restaurants (AI Ask Box)')}
        </span>
        <span style={{ marginLeft:'auto',fontSize:'.75rem',color:'var(--muted)' }}>
          {tx(lang,'อิงจาก dataset จริง','Based on scraped dataset')} · {open?'▲':'▼'}
        </span>
      </div>
      {open && (
        <div style={{ padding:'16px 20px' }}>
          <div style={{ display:'flex',gap:8,flexWrap:'wrap',marginBottom:12 }}>
            {SUGGESTIONS.map((s,i) =>
              <button key={i} onClick={() => ask(tx(lang, s.th, s.en))}
                style={{ border:'1.5px solid var(--bord)',borderRadius:20,padding:'4px 12px',fontSize:'.75rem',background:'var(--surf)',color:'var(--ink)',cursor:'pointer',fontFamily:'inherit',transition:'border-color .15s' }}
                onMouseOver={(e) => e.target.style.borderColor='var(--acc)'}
                onMouseOut={(e) => e.target.style.borderColor='var(--bord)'}>
                {tx(lang, s.th, s.en)}
              </button>
            )}
          </div>
          <div style={{ display:'flex',gap:8 }}>
            <input value={q} onChange={(e) => setQ(e.target.value)}
              onKeyDown={(e) => e.key==='Enter' && ask(q)}
              placeholder={tx(lang,'ถามเกี่ยวกับร้านอาหาร เช่น ร้านไหนถูกที่สุด...','Ask about restaurants, e.g. which is closest to BTS...')}
              style={{ flex:1,border:'1.5px solid var(--bord)',borderRadius:8,padding:'8px 12px',fontSize:'.84rem',background:'var(--bg)',color:'var(--ink)',outline:'none',fontFamily:'inherit' }} />
            <button onClick={() => ask(q)} disabled={loading || !q.trim()}
              style={{ background:'var(--acc)',color:'white',border:'none',borderRadius:8,padding:'8px 16px',fontSize:'.82rem',fontWeight:600,cursor:'pointer',opacity:loading||!q.trim()?.5:1,fontFamily:'inherit',whiteSpace:'nowrap' }}>
              {loading?'...':tx(lang,'ถาม →','Ask →')}
            </button>
          </div>
          {(answer||loading) && (
            <div style={{ marginTop:12,padding:'12px 16px',background:'var(--surf)',borderRadius:10,fontSize:'.84rem',lineHeight:1.7,borderLeft:'3px solid var(--acc)' }}>
              {loading
                ? <span style={{ color:'var(--muted)' }}>{tx(lang,'🤖 กำลังวิเคราะห์ข้อมูล...','🤖 Analyzing data...')}</span>
                : <span>🤖 {fmt(answer)}</span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

      <div className="ctop">

          <ul className="evlist"><li>Raw Sheet: name, price, rating, reviews</li><li>Clean Sheet: rs ratios, pros/cons, group fit</li></ul>
        </div>
        <div className="evcard">
          <div className="evtitle">4) Scoring Model</div>
          <p className="evtext">{tx(lang,'ใช้ weighted scoring รวม 6 ปัจจัย น้ำหนักรวม 100 คะแนน และผู้ใช้สามารถปรับน้ำหนักเองได้ในหน้าเว็บ','Uses a 6-factor weighted scoring model totaling 100 points; users can adjust weights directly in the web page.')}</p>
          <ul className="evlist"><li>Rating & Review 25 pts</li><li>Group Suitability 20 pts</li><li>Price / Travel / Data 15 pts each</li><li>Uniqueness 10 pts</li></ul>
        </div>
        <div className="evcard">
          <div className="evtitle">5) Top 3 · Current Ranking</div>
          <p className="evtext">{tx(lang,'ระบบจัดอันดับจากคะแนนรวมแบบถ่วงน้ำหนัก อันดับปัจจุบัน (ปรับน้ำหนักได้):','Current weighted-score ranking (adjustable weights):')}</p>
          <ul className="evlist">{ranked.map((r,i)=><li key={r.id}>#{i+1} {r.name} — {r.sc}/100</li>)}</ul>
        </div>
        <div className="evcard">
          <div className="evtitle">6) AI Analysis & Automation</div>
          <p className="evtext">{tx(lang,'มี AI Ask Box สำหรับถามคำถามจาก dataset และ Automation pipeline: Apify → n8n webhook → Google Sheets → Claude API','AI Ask Box for dataset queries. Automation: Apify scraper → n8n webhook → Google Sheets → Claude API enrichment.')}</p>
          <ul className="evlist"><li>Apify Google Maps Scraper</li><li>n8n: receive → clean → score → update Sheets</li><li>Claude API: pros/cons + sentiment</li></ul>
        </div>
      </div>
      <div className="submit-box">
        <strong>{tx(lang,'✅ Checklist ก่อนส่ง:','✅ Submission Checklist:')}</strong><br/>
        {tx(lang,
          '☑ HTML Page (this file) · ☑ Google Sheets (raw + clean data) · ☑ Scraping evidence (Apify export) · ☑ Prompt history · ☑ n8n automation workflow · ☑ Top 3 recommendation · ☑ AI Ask Box grounded on dataset',
          '☑ HTML Page (this file) · ☑ Google Sheets (raw + clean data) · ☑ Scraping evidence (Apify export) · ☑ Prompt history · ☑ n8n automation workflow · ☑ Top 3 recommendation · ☑ AI Ask Box grounded on dataset'
        )}
      </div>
    </>
  );
}

// ─── APP ──────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks({ theme:'warm' });
  const [lang, setLang] = useState('th');
  const [weights, setWeights] = useState({ ...DW });
  const [filt, setFilt] = useState({ cuisine:'all', maxPrice:450, maxBts:30, area:'asok' });
  const [sort, setSort] = useState({ by:'score', dir:'desc' });
  const [layout, setLayout] = useState('cards');
  const [showW, setShowW] = useState(false);
  const [sel, setSel] = useState(null);
  const [data, setData] = useState(FALLBACK_DATA);
  const [loadingData, setLoadingData] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);

  const loadData = () => {
    setRefreshing(true);
    fetchFromSheets()
      .then(d => { if (d && d.length > 0) { setData(d); setLastUpdated(new Date()); } })
      .catch(() => {})
      .finally(() => { setLoadingData(false); setRefreshing(false); });
  };

  useEffect(() => { loadData(); }, []);

  const thVars = THEMES[t.theme] || THEMES.warm;

  const list = useMemo(() => {
    return data
      .filter((r) => {
        // area filter: FALLBACK_DATA has no area field → default 'asok'
        if ((r.area || 'asok') !== filt.area) return false;
        if (filt.cuisine !== 'all' && r.cuisine !== filt.cuisine) return false;
        if (r.price > filt.maxPrice) return false;
        if (r.bts > filt.maxBts) return false;
        return true;
      })
      .map((r) => ({ ...r, sc:score(r,weights), bk:breakdown(r,weights) }))
      .sort((a,b) => {
        const d = sort.dir==='desc'?-1:1;
        if (sort.by==='score')  return d*(a.sc-b.sc);
        if (sort.by==='rating') return d*(a.rating-b.rating);
        if (sort.by==='price')  return d*(a.price-b.price);
        if (sort.by==='bts')    return d*(a.bts-b.bts);
        return 0;
      });
  }, [data, weights, filt, sort]);

  return (
    <div style={thVars}>
      <Header lang={lang} setLang={setLang} count={data.length} loadingData={loadingData} />
      <FilterBar lang={lang} filt={filt} setFilt={setFilt} sort={sort} setSort={setSort} layout={layout} setLayout={setLayout} showW={showW} setShowW={setShowW} />
      {showW && <WeightPanel lang={lang} weights={weights} setWeights={setWeights} />}
      <ScenarioBar lang={lang} setFilt={setFilt} setSort={setSort} />
      <div className="main">
        {loadingData ? (
          <div style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'rgba(212,160,67,0.12)',border:'1px solid rgba(212,160,67,0.35)',borderRadius:10,marginBottom:14,fontSize:'.78rem',color:'var(--ink)' }}>
            <span>⏳</span><span>กำลังโหลดข้อมูลจาก Google Sheets...</span>
          </div>
        ) : (
          <div style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'rgba(90,160,90,0.12)',border:'1px solid rgba(90,160,90,0.35)',borderRadius:10,marginBottom:14,fontSize:'.78rem',color:'var(--ink)' }}>
            <span style={{ fontSize:'1rem' }}>🟢</span>
            <span style={{ flex:1 }}>
              <strong>LIVE</strong> · อ่านจาก Google Sheets · <strong>{data.length} ร้าน</strong>
              {lastUpdated && <span style={{ opacity:.7 }}> · อัพเดท {lastUpdated.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>}
            </span>
            <button onClick={loadData} disabled={refreshing}
              style={{ padding:'3px 12px',borderRadius:6,border:'1px solid rgba(90,160,90,0.5)',background:'rgba(90,160,90,0.15)',cursor:'pointer',fontSize:'.75rem',fontWeight:600,color:'var(--ink)',opacity:refreshing?0.5:1 }}>
              {refreshing ? '⏳' : '🔄'} รีโหลด
            </button>
          </div>
        )}
        {list.length === 0 && !loadingData ? (
          <div style={{ textAlign:'center',padding:'60px 20px',color:'var(--muted)' }}>
            <div style={{ fontSize:'2.8rem',marginBottom:12 }}>🗺️</div>
            <div style={{ fontFamily:'Playfair Display,serif',fontSize:'1.25rem',fontWeight:700,marginBottom:8,color:'var(--ink)' }}>
              {tx(lang,
                `ยังไม่มีข้อมูลโซน${AREAS.find(a=>a.id===filt.area)?.th || filt.area}`,
                `No data yet for ${AREAS.find(a=>a.id===filt.area)?.en || filt.area}`
              )}
            </div>
            <div style={{ fontSize:'.85rem',marginBottom:20 }}>
              {tx(lang,'รัน Apify + n8n เพื่อดึงข้อมูลโซนนี้ แล้วกด รีโหลด','Run Apify + n8n to scrape this zone, then click Reload')}
            </div>
            <button onClick={loadData}
              style={{ padding:'8px 22px',borderRadius:8,border:'1px solid var(--acc)',background:'var(--acc)',color:'white',cursor:'pointer',fontSize:'.83rem',fontWeight:600 }}>
              🔄 {tx(lang,'รีโหลดข้อมูล','Reload Data')}
            </button>
          </div>
        ) : (
          <>
            <AskBox lang={lang} list={list} weights={weights} data={data} />
            {layout==='cards'    && <CardGrid    list={list} lang={lang} onSel={setSel} weights={weights} />}
            {layout==='table'    && <TableView   list={list} lang={lang} onSel={setSel} sort={sort} setSort={setSort} />}
            {layout==='magazine' && <MagView     list={list} lang={lang} onSel={setSel} />}
            <HomeworkEvidence lang={lang} weights={weights} list={list} />
          </>
        )}
      </div>
      {sel && <Modal r={sel} weights={weights} lang={lang} onClose={() => setSel(null)} />}
      <TweaksPanel>
        <TweakSection label={tx(lang,'ธีมสี','Color Theme')} />
        <TweakRadio label={tx(lang,'ธีม','Theme')} value={t.theme}
          options={['warm','dark','sage']}
          onChange={(v) => setTweak('theme', v)} />
        <TweakSection label={tx(lang,'มุมมอง','Layout')} />
        <TweakRadio label={tx(lang,'วิว','View')} value={layout}
          options={['cards','table','magazine']}
          onChange={(v) => setLayout(v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
