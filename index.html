<style>

.kpin{font-size:1.35rem;font-weight:800;color:var(--acc);line-height:1}
.kpil{font-size:.72rem;color:var(--muted);margin-top:4px}

.mscrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}

.info-block h4{font-size:.70rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.info-block ul{list-style:none;font-size:.82rem}

.wf-steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-top:12px}

.wf-label{font-weight:600;font-size:.78rem;line-height:1.3}
.wf-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.top3-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px;margin-bottom:6px}
.t3card{background:var(--card);border:2px solid var(--bord);border-radius:18px;padding:22px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.t3card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(44,24,16,.15)}

.t3-hl{background:var(--surf);border-radius:8px;padding:9px 12px;font-size:.76rem;font-style:italic;line-height:1.5;margin-top:10px;color:var(--ink)}
.t3-pros{margin-top:10px}
.t3-pro-item{display:flex;gap:7px;font-size:.76rem;margin-bottom:4px;align-items:flex-start;line-height:1.4}
.score-tbl-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid var(--bord);margin-top:10px}

.score-tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--bord);vertical-align:top}

.cmp-table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--card)}
.cmp-table th{background:linear-gradient(135deg,#0d2f2c,#134e49);color:white;padding:11px 14px;text-align:left;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.cmp-mini-bar{display:flex;align-items:center;gap:8px}

<div id="root"></div>
<script type="text/babel">
function useTweaks(defaults) {
  const [state, setState] = React.useState({ ...defaults });
  const set = (key, value) => setState((prev) => ({ ...prev, [key]: value }));
  return [state, set];
}
function TweaksPanel({ children }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ position:'fixed',bottom:20,right:20,zIndex:999,fontFamily:"'IBM Plex Sans','Sarabun',system-ui,sans-serif" }}>
      {open && (
        <div style={{ background:'var(--card,#FEFCF8)',border:'1.5px solid var(--bord,#DDD0BE)',borderRadius:14,padding:'14px 18px',marginBottom:10,minWidth:220,boxShadow:'0 8px 32px rgba(44,24,16,.18)' }}>
          <div style={{ fontSize:'.70rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--muted,#8A7468)',marginBottom:12 }}>⚙️ Settings</div>
          {children}
        </div>
      )}
      <button onClick={() => setOpen((o) => !o)}
        style={{ width:42,height:42,borderRadius:'50%',border:'1.5px solid var(--bord,#DDD0BE)',background:open?'var(--acc,#C4673A)':'var(--card,#FEFCF8)',color:open?'white':'var(--ink,#2C1810)',fontSize:'1.1rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(44,24,16,.14)',marginLeft:'auto',transition:'background .2s,color .2s' }}>
        {open ? '✕' : '⚙️'}
      </button>
    </div>
  );
}
function TweakSection({ label }) {
  return <div style={{ fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--muted,#8A7468)',margin:'12px 0 6px',borderTop:'1px solid var(--bord,#DDD0BE)',paddingTop:10 }}>{label}</div>;
}
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => typeof o === 'string' ? { label: o, value: o } : o);
  return (
    <div style={{ marginBottom:10 }}>
      {label && <div style={{ fontSize:'.72rem',color:'var(--muted,#8A7468)',marginBottom:5 }}>{label}</div>}
      <div style={{ display:'flex',flexWrap:'wrap',gap:5 }}>
        {opts.map((o) => {
          const active = o.value === value;
          return <button key={o.value} onClick={() => onChange(o.value)} style={{ border:`1.5px solid ${active?'var(--acc,#C4673A)':'var(--bord,#DDD0BE)'}`,borderRadius:20,padding:'3px 11px',fontSize:'.74rem',fontWeight:active?700:500,cursor:'pointer',background:active?'var(--acc,#C4673A)':'transparent',color:active?'white':'var(--ink,#2C1810)',fontFamily:'inherit',transition:'all .15s' }}>{o.label}</button>;
        })}
      </div>
    </div>
  );
}
</script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const THEMES = {
  warm: { '--bg':'#F7F1E8','--card':'#FEFCF8','--surf':'#EFE8DA','--ink':'#2C1810','--acc':'#C4673A','--acc2':'#D4A043','--acc3':'#5C7A3E','--muted':'#8A7468','--bord':'#DDD0BE','--hbg':'linear-gradient(135deg,#0d2f2c 0%,#134e49 45%,#1a6860 100%)' },
  dark:  { '--bg':'#1A1008','--card':'#261508','--surf':'#1E1205','--ink':'#F0E6D6','--acc':'#E8853D','--acc2':'#D4A247','--acc3':'#7BAE6A','--muted':'#9A8070','--bord':'#3A2010','--hbg':'linear-gradient(135deg,#0d2f2c 0%,#134e49 45%,#1a6860 100%)' },
  sage:  { '--bg':'#EEF2EC','--card':'#F8FAF7','--surf':'#E2EBE0','--ink':'#1E2D1A','--acc':'#4A7A52','--acc2':'#8B6B3D','--acc3':'#C4673A','--muted':'#6A7D66','--bord':'#C8DAC5','--hbg':'linear-gradient(135deg,#0d2f2c 0%,#134e49 45%,#1a6860 100%)' }
};

const DW = { rating:25, group:20, price:15, travel:15, data:15, unique:10 };
const WKEYS = [
  { k:'rating', th:'Rating & Review',    en:'Rating & Review',    max:40, col:'#C4673A' },
  { k:'group',  th:'Group Suitability',  en:'Group Suitability',  max:40, col:'#D4A043' },
  { k:'price',  th:'Price Suitability',  en:'Price Suitability',  max:30, col:'#5C7A3E' },
  { k:'travel', th:'Travel Convenience', en:'Travel Convenience', max:30, col:'#2980B9' },
  { k:'data',   th:'Data Completeness',  en:'Data Completeness',  max:30, col:'#8E44AD' },
  { k:'unique', th:'Uniqueness / Exp',   en:'Uniqueness / Exp',   max:20, col:'#E67E22' }

    const rsGroup  = (parseFloat(g(9))||0) / DW.group;
    const rsPrice  = (parseFloat(g(10))||0) / DW.price;
    const rsTravel = (parseFloat(g(11))||0) / DW.travel;
    const rsData   = (parseFloat(g(12))||0) / DW.data;
    const rsUnique = (parseFloat(g(13))||0) / DW.unique;
    let cuisine = 'mixed';
    const t = typeEn.toLowerCase();
    if (t.includes('thai') || t.includes('seafood')) cuisine = 'thai';
    else if (t.includes('japanese') || t.includes('ramen') || t.includes('sushi') || t.includes('izakaya')) cuisine = 'japanese';
    else if (t.includes('korean')) cuisine = 'korean';
    else if (t.includes('chinese') || t.includes('dim sum')) cuisine = 'chinese';
    else if (t.includes('italian') || t.includes('western') || t.includes('steak') || t.includes('pizza') || t.includes('mexican') || t.includes('lebanese') || t.includes('sandwich') || t.includes('vietnamese')) cuisine = 'western';
    const pl = price <= 150 ? 1 : price <= 350 ? 2 : price <= 600 ? 3 : 4;
    const prosRaw = String(g(16) || '');
    const consRaw = String(g(17) || '');
    const pros = prosRaw.split(/[|\n]/).map(s => s.trim()).filter(Boolean);
    const cons = consRaw.split(/[|\n]/).map(s => s.trim()).filter(Boolean);
    // area: fallback to 'other' so uncategorized restaurants appear in all zone tabs
    const area = String(g(19) || 'other').toLowerCase().trim();
    return {
      id: idx+1, name, cuisine, typeTh: typeEn, typeEn, rating, rev: reviews, price, pl, bts, grp,
      rs: { rating: rsRating, group: rsGroup, price: rsPrice, travel: rsTravel, data: rsData, unique: rsUnique },
      prosTh: pros.length ? pros : [`Rating ${rating}★`], prosEn: pros.length ? pros : [`Rating ${rating}★`],
      consTh: cons.length ? cons : ['โปรดตรวจสอบข้อมูลก่อนเยี่ยม'], consEn: cons.length ? cons : ['Please verify details before visiting'],
      hlTh: String(g(15)||''), hlEn: String(g(15)||''),
      sent: (() => { const p=Math.min(80,Math.round(55+rating*8)); const neg=Math.max(5,Math.round((100-p)*0.18)); return {p, n:100-p-neg, neg}; })(),
      url: mapsUrl, area
    };
  });
  const areaCounts = {};
  results.forEach(r => { areaCounts[r.area] = (areaCounts[r.area]||0)+1; });
  console.log(`[AI Food] ✅ Sheet fetch OK — ${results.length} restaurants`, areaCounts);
  return results;
}

<script type="text/babel">
// ─── AI ASK BOX ──────────────────────────────────────────────────────────────
function AskBox({ lang, list, weights, data }) {
  data = data || FALLBACK_DATA;
  const [q, setQ] = useState('');
  const [answer, setAnswer] = useState(null);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(true);
  const ruleAnswer = (q) => {
    const ql = (q||'').toLowerCase();
    const sorted = [...data].map((r) => ({ ...r, sc: score(r, weights) })).sort((a,b)=>b.sc-a.sc);
    if (/ถูก|cheap|budget|ประหยัด/.test(ql)) { const r=[...sorted].sort((a,b)=>a.price-b.price)[0]; return tx(lang,`ร้านที่ถูกที่สุดคือ **${r.name}** ราคา ~฿${r.price}/คน คะแนน AI ${r.sc}/100`,`Cheapest: **${r.name}** ~฿${r.price}/pp — AI score ${r.sc}/100`); }
    if (/bts|ใกล้|เดิน|walk/.test(ql)) { const r=[...sorted].sort((a,b)=>a.bts-b.bts)[0]; return tx(lang,`ใกล้ BTS ที่สุด: **${r.name}** เดิน ${r.bts} นาที คะแนน ${r.sc}/100`,`Closest to BTS: **${r.name}** — ${r.bts}-min walk, score ${r.sc}/100`); }
    if (/กลุ่มใหญ่|group|ทีม|12|10/.test(ql)) { const r=sorted[0]; return tx(lang,`แนะนำสำหรับกลุ่มใหญ่: **${r.name}** คะแนน ${r.sc}/100 ราคา ฿${r.price}/คน`,`Best for big group: **${r.name}** score ${r.sc}/100, ฿${r.price}/pp`); }
    if (/seafood|อาหารทะเล/.test(ql)) { const r=sorted.find(r=>r.typeTh.includes('ทะเล'))||sorted[0]; return tx(lang,`อาหารทะเลที่ดีที่สุด: **${r.name}** ฿${r.price}/คน Rating ${r.rating}★`,`Best seafood: **${r.name}** ฿${r.price}/pp, ${r.rating}★`); }
    if (/ไทย|thai/.test(ql)) { const r=sorted.find(r=>r.cuisine==='thai')||sorted[0]; return tx(lang,`อาหารไทยแนะนำ: **${r.name}** (${r.typeTh}) ฿${r.price}/คน Rating ${r.rating}★`,`Thai food pick: **${r.name}** (${r.typeEn}) ฿${r.price}/pp, ${r.rating}★`); }
    if (/อันดับ|top|best|1/.test(ql)) { const r=sorted[0]; return tx(lang,`คะแนนสูงสุดคือ **${r.name}** ได้ ${r.sc}/100 ราคา ฿${r.price}/คน`,`Top scored: **${r.name}** with ${r.sc}/100 — ฿${r.price}/pp`); }
    return tx(lang,`จากข้อมูล ${data.length} ร้าน — แนะนำ **${sorted[0]?.name}** (${sorted[0]?.sc} pts) เป็นอันดับ 1`,`From ${data.length} restaurants — top pick: **${sorted[0]?.name}** (${sorted[0]?.sc} pts).`);
  };
  const fmt = (text) => { if (!text) return null; const parts=text.split(/\*\*(.*?)\*\*/); return parts.map((p,i)=>i%2===1?<strong key={i} style={{color:'var(--acc)'}}>{p}</strong>:p); };
  const ask = async (question) => {
    if (!question.trim()) return;
    setQ(question); setLoading(true); setAnswer(null);
    try {
      if (window.claude?.complete) {
        const ctxStr = data.map(r=>{const sc=score(r,weights);return `${r.name}(${r.typeTh}):${sc}/100,฿${r.price}/คน,${r.rating}★,BTS${r.bts}นาที`;}).join('\n');
        const prompt = `You are a concise food assistant for a Bangkok office team in Asok area. Answer in ${lang==='th'?'Thai':'English'} using ONLY this data:\n${ctxStr}\nQuestion: ${question}\nAnswer specifically, mention restaurant names, max 2-3 sentences.`;
        setAnswer(await window.claude.complete(prompt));
      } else { await new Promise(r=>setTimeout(r,500)); setAnswer(ruleAnswer(question)); }
    } catch(e) { setAnswer(ruleAnswer(question)); }
    setLoading(false);
  };
  const SUGGESTIONS = [
    { th:'ร้านไหนถูกที่สุด?', en:'Which is cheapest?' },
    { th:'ใกล้ BTS ที่สุด?', en:'Closest to BTS?' },
    { th:'เหมาะกลุ่ม 12 คน?', en:'Fits 12 people?' },
    { th:'อาหารไทยที่ดีที่สุด?', en:'Best Thai food?' }
  ];
  return (
    <div style={{ background:'var(--card)',border:'1.5px solid var(--bord)',borderRadius:16,marginBottom:22,overflow:'hidden' }}>
      <div onClick={() => setOpen(o=>!o)} style={{ display:'flex',alignItems:'center',gap:10,padding:'14px 20px',cursor:'pointer',borderBottom:open?'1px solid var(--bord)':'none' }}>
        <span style={{ fontSize:'1.1rem' }}>🤖</span>
        <span style={{ fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'1rem' }}>{tx(lang,'ถามข้อมูลร้านอาหาร (AI Ask Box)','Ask About Restaurants (AI Ask Box)')}</span>
        <span style={{ marginLeft:'auto',fontSize:'.75rem',color:'var(--muted)' }}>{tx(lang,'อิงจาก dataset จริง','Based on scraped dataset')} · {open?'▲':'▼'}</span>
      </div>
      {open && (
        <div style={{ padding:'16px 20px' }}>
          <div style={{ display:'flex',gap:8,flexWrap:'wrap',marginBottom:12 }}>
            {SUGGESTIONS.map((s,i)=>(
              <button key={i} onClick={()=>ask(tx(lang,s.th,s.en))}
                style={{ border:'1.5px solid var(--bord)',borderRadius:20,padding:'4px 12px',fontSize:'.75rem',background:'var(--surf)',color:'var(--ink)',cursor:'pointer',fontFamily:'inherit',transition:'border-color .15s' }}
                onMouseOver={e=>e.target.style.borderColor='var(--acc)'}
                onMouseOut={e=>e.target.style.borderColor='var(--bord)'}>
                {tx(lang,s.th,s.en)}
              </button>
            ))}
          </div>
          <div style={{ display:'flex',gap:8 }}>
            <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ask(q)}
              placeholder={tx(lang,'ถามเกี่ยวกับร้านอาหาร เช่น ร้านไหนถูกที่สุด...','Ask e.g. which is closest to BTS...')}
              style={{ flex:1,border:'1.5px solid var(--bord)',borderRadius:8,padding:'8px 12px',fontSize:'.84rem',background:'var(--bg)',color:'var(--ink)',outline:'none',fontFamily:'inherit' }} />
            <button onClick={()=>ask(q)} disabled={loading||!q.trim()}
              style={{ background:'var(--acc)',color:'white',border:'none',borderRadius:8,padding:'8px 16px',fontSize:'.82rem',fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',opacity:loading||!q.trim()?0.5:1 }}>
              {loading?'...':tx(lang,'ถาม →','Ask →')}
            </button>
          </div>
          {(answer||loading)&&(
            <div style={{ marginTop:12,padding:'12px 16px',background:'var(--surf)',borderRadius:10,fontSize:'.84rem',lineHeight:1.7,borderLeft:'3px solid var(--acc)' }}>
              {loading?<span style={{color:'var(--muted)'}}>🤖 {tx(lang,'กำลังวิเคราะห์...','Analyzing...')}</span>:<span>🤖 {fmt(answer)}</span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── CARD ────────────────────────────────────────────────────────────────────
function RCard({ r, rank, sc, bk, lang, onClick }) {
  const [in_, setIn] = useState(false);
  useEffect(() => { const t=setTimeout(()=>setIn(true),60+rank*30); return ()=>clearTimeout(t); }, []);
  return (
    <div className="rcard" onClick={onClick} style={{ opacity:in_?1:0,transform:in_?'none':'translateY(12px)',transition:`opacity .35s ${rank*.05}s,transform .35s ${rank*.05}s,box-shadow .22s,border-color .22s` }}>
      <div className="ctop">
        <div className={`crkbadge ${rankCls(rank)}`}>{rank+1}</div>
        <div style={{ textAlign:'right' }}><span className="cscore">{sc}</span><span className="csdenom">/100</span></div>
      </div>
      <div className="cname">{r.name}</div>
      <div className="ctype">{tx(lang,r.typeTh,r.typeEn)}</div>
      <div className="cmeta">
        <div className="cmi">⭐ <strong>{r.rating}</strong><span>({r.rev}+)</span></div>
        <div className="cmi">💰 <strong>{priceStr(r.pl)}</strong><span style={{fontSize:'.72rem'}}> ฿{r.price}/{tx(lang,'คน','pp')}</span></div>
        <div className="cmi">🚇 <strong>{r.bts} min</strong></div>
      </div>
      <div className="sbk">
        {WKEYS.map(({ k, col }) => (
          <div key={k} className="srow">
            <span className="srlab">{k}</span>
            <Bar pct={r.rs[k]*100} col={col} h={4} />
            <span className="srval">{bk[k]}</span>

      </div>
      <div className="ctags">
        <span className="tchip" style={{ background:'rgba(196,103,58,.1)',color:'var(--acc)' }}>👥 {r.grp==='great'?tx(lang,'เหมาะมาก','Great'):tx(lang,'ดี','Good')}</span>
        {r.bts<=5&&<span className="tchip" style={{ background:'rgba(92,122,62,.1)',color:'var(--acc3)' }}>🚇 {tx(lang,'ใกล้ BTS','Near BTS')}</span>}
        {r.pl<=2&&<span className="tchip" style={{ background:'rgba(212,160,67,.12)',color:'var(--acc2)' }}>💚 {tx(lang,'ราคาดี','Value')}</span>}
      </div>
    </div>
  );
}

        ))}
      </div>
      {rest.length>0&&<>
        <h3 style={{fontFamily:'Playfair Display,serif',fontSize:'.95rem',fontWeight:700,marginBottom:12,color:'var(--muted)'}}>{tx(lang,'อันดับ 4+','Ranked 4+')}</h3>
        <div className="mlist">
          {rest.map((r,i)=>(
            <div key={r.id} className="mli" onClick={()=>onSel(r)}>
              <div className={`crkbadge ${rankCls(i+3)}`} style={{width:28,height:28,flexShrink:0}}>{i+4}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'.88rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</div>
                <div style={{fontSize:'.73rem',color:'var(--muted)'}}>{tx(lang,r.typeTh,r.typeEn)} · ⭐{r.rating} · ฿{r.price}/{tx(lang,'คน','pp')} · 🚇{r.bts}min</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                <div style={{width:80}}><Bar pct={r.sc} col='var(--acc)' h={5} /></div>
                <span style={{fontWeight:800,fontSize:'1rem',color:'var(--acc)',width:32,textAlign:'right'}}>{r.sc}</span>
              </div>
            </div>
          ))}
        </div>
      </>}
    </div>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({ r, weights, lang, onClose }) {
  const sc=score(r,weights), bk=breakdown(r,weights);
  useEffect(() => { const h=(e)=>{if(e.key==='Escape')onClose();}; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); }, []);
  return (
    <div className="movl" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mbox">
        <div className="mhdr">
          <button className="mclose" onClick={onClose}>✕</button>
          <div style={{fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.2px',opacity:.7,marginBottom:6}}>{tx(lang,'รายละเอียด','Restaurant Detail')}</div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:'1.65rem',fontWeight:800,marginBottom:4}}>{r.name}</div>
          <div style={{opacity:.78,fontSize:'.85rem',marginBottom:16}}>{tx(lang,r.typeTh,r.typeEn)}</div>
          <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontFamily:'Playfair Display,serif',fontSize:'2.8rem',fontWeight:900,lineHeight:1,color:'var(--acc2)'}}>{sc}</span>
              <span style={{fontSize:'.72rem',opacity:.7}}>/ 100 pts</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5,fontSize:'.83rem'}}>
              <span>⭐ {r.rating}/5.0 ({r.rev}+ {tx(lang,'รีวิว','reviews')})</span>
              <span>💰 ~฿{r.price}/{tx(lang,'คน','person')}</span>
              <span>🚇 {r.bts} min {tx(lang,'จาก BTS อโศก','from BTS Asok')}</span>
            </div>
          </div>
        </div>
        <div className="mbody">
          <div className="msec">{tx(lang,'คะแนนรายหมวด','Score Breakdown')}</div>
          {WKEYS.map(({k,th,en,col})=>(
            <div key={k} className="mscrow">
              <span className="msclbl">{tx(lang,th,en)}</span>
              <div className="mscbar"><Bar pct={r.rs[k]*100} col={col} h={8} /></div>
              <span className="mscnum">{bk[k]}/{weights[k]}</span>
            </div>
          ))}
          <div className="msec">{tx(lang,'จุดเด่น / ข้อควรระวัง','Pros & Cons')}</div>
          <div className="pc">
            <div>{(lang==='th'?r.prosTh:r.prosEn).map((p,i)=><div key={i} className="pci"><span className="pd">✓</span><span>{p}</span></div>)}</div>
            <div>{(lang==='th'?r.consTh:r.consEn).map((c,i)=><div key={i} className="pci"><span className="cd">!</span><span>{c}</span></div>)}</div>
          </div>
          <div className="msec">Sentiment Analysis (AI)</div>
          <div style={{fontSize:'.78rem',color:'var(--muted)',marginBottom:7}}>
            <span style={{color:'#5C7A3E',fontWeight:600}}>{r.sent.p}% Positive</span>{' · '}<span>{r.sent.n}% Neutral</span>{' · '}<span style={{color:'#C4673A',fontWeight:600}}>{r.sent.neg}% Negative</span>
          </div>
          <div className="sentbar">
            <div style={{width:`${r.sent.p}%`,background:'#5C7A3E'}} />
            <div style={{width:`${r.sent.n}%`,background:'var(--bord)'}} />
            <div style={{width:`${r.sent.neg}%`,background:'#C4673A'}} />
          </div>
          {r.hlTh&&<div style={{marginTop:16,padding:'12px 16px',background:'var(--surf)',borderRadius:10,fontSize:'.84rem',fontStyle:'italic',lineHeight:1.6}}>💡 {tx(lang,r.hlTh,r.hlEn)}</div>}
          <div style={{marginTop:14}}>
            <a href={r.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,background:'var(--acc)',color:'white',textDecoration:'none',borderRadius:8,padding:'8px 18px',fontSize:'.82rem',fontWeight:600}}>
              📍 {tx(lang,'ดูบน Google Maps','View on Google Maps')}
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── HOMEWORK EVIDENCE ───────────────────────────────────────────────────────

        <div className="kpi"><div className="kpin">15</div><div className="kpil">n8n Nodes</div></div>

        <div className="kpi"><div className="kpin">2</div><div className="kpil">Data Sources</div></div>

          <ul className="evlist"><li>พื้นที่: อโศก (Asok, Bangkok)</li><li>เป้าหมาย: Top 3 recommendations</li><li>Output: Interactive HTML page</li></ul>

          <ul className="evlist"><li>Raw Sheet: name, price, rating, reviews, source</li><li>Clean Sheet: rs ratios, pros/cons, group fit, highlight</li></ul>
        </div>
        <div className="evcard">
          <div className="evtitle">4) Scoring Model (100 pts)</div>
          <p className="evtext">{tx(lang,'ใช้ Weighted Scoring 6 ปัจจัย รวม 100 คะแนน ผู้ใช้ปรับน้ำหนักได้เองผ่านหน้าเว็บ','6-factor weighted scoring model totaling 100 points; users can adjust weights live on this page.')}</p>
          <ul className="evlist"><li>Rating & Review: 25 pts</li><li>Group Suitability: 20 pts</li><li>Price / Travel / Data: 15 pts each</li><li>Uniqueness: 10 pts</li></ul>
        </div>
        <div className="evcard">
          <div className="evtitle">5) Top 3 · Current Ranking</div>

          <ul className="evlist">{ranked.map((r,i)=><li key={r.id}>#{i+1} {r.name} — {r.sc}/100</li>)}</ul>

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks({ theme:'warm' });
  const [lang, setLang] = useState('th');
  const [weights, setWeights] = useState({ ...DW });
  const [filt, setFilt] = useState({ cuisine:'all', maxPrice:450, maxBts:30, area:'all' });
  const [sort, setSort] = useState({ by:'score', dir:'desc' });
  const [layout, setLayout] = useState('cards');
  const [showW, setShowW] = useState(false);
  const [sel, setSel] = useState(null);
  const [data, setData] = useState(FALLBACK_DATA);
  const [loadingData, setLoadingData] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [sheetOk, setSheetOk] = useState(false);

  const loadData = () => {
    setRefreshing(true);
    fetchFromSheets()
      .then(d => { if (d && d.length > 0) { setData(d); setLastUpdated(new Date()); setSheetOk(true); } })
      .catch(err => { console.warn('[AI Food] ❌ Sheet fetch failed, using fallback data:', err); })
      .finally(() => { setLoadingData(false); setRefreshing(false); });
  };
  useEffect(() => { loadData(); }, []);

  const thVars = THEMES[t.theme] || THEMES.warm;
  const list = useMemo(() => {
    return data
      .filter(r => {
        if (filt.area !== 'all' && r.area !== filt.area && r.area !== 'other') return false;
        if (filt.cuisine !== 'all' && r.cuisine !== filt.cuisine) return false;
        if (r.price > filt.maxPrice) return false;
        if (r.bts > filt.maxBts) return false;
        return true;
      })
      .map(r => ({ ...r, sc:score(r,weights), bk:breakdown(r,weights) }))
      .sort((a,b) => {
        const d = sort.dir==='desc'?-1:1;
        if (sort.by==='score')  return d*(a.sc-b.sc);
        if (sort.by==='rating') return d*(a.rating-b.rating);
        if (sort.by==='price')  return d*(a.price-b.price);
        if (sort.by==='bts')    return d*(a.bts-b.bts);
        return 0;
      });
  }, [data, weights, filt, sort]);

  return (
    <div style={thVars}>
      <Header lang={lang} setLang={setLang} count={data.length} loadingData={loadingData} />
      <FilterBar lang={lang} filt={filt} setFilt={setFilt} sort={sort} setSort={setSort} layout={layout} setLayout={setLayout} showW={showW} setShowW={setShowW} />
      {showW && <WeightPanel lang={lang} weights={weights} setWeights={setWeights} />}
      <ScenarioBar lang={lang} setFilt={setFilt} setSort={setSort} />
      <div className="main">
        {SHEET_ID === 'YOUR_SHEET_ID_HERE' && (
          <div style={{ background:'linear-gradient(135deg,rgba(212,160,67,.12),rgba(196,103,58,.08))',border:'1.5px dashed var(--acc)',borderRadius:12,padding:'14px 18px',marginBottom:18,fontSize:'.83rem' }}>
            <strong>⚙️ {tx(lang,'ตั้งค่า Google Sheets:','Setup Google Sheets:')}</strong>
            {tx(lang,
              ' อัปโหลดไฟล์ TeamDinner_BKK_GPYellow_Pong.xlsx ขึ้น Google Drive → Share → Anyone with link → Viewer → คัดลอก Sheet ID จาก URL → แทนที่ YOUR_SHEET_ID_HERE ในโค้ด HTML',
              ' Upload TeamDinner_BKK_GPYellow_Pong.xlsx to Google Drive → Share → Anyone with link → Viewer → Copy Sheet ID from URL → Replace YOUR_SHEET_ID_HERE in the HTML code'
            )}
          </div>
        )}
        {!loadingData && sheetOk && (
          <div style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'rgba(90,160,90,0.12)',border:'1px solid rgba(90,160,90,0.35)',borderRadius:10,marginBottom:14,fontSize:'.78rem',color:'var(--ink)' }}>
            <span>🟢</span>
            <span style={{flex:1}}><strong>LIVE</strong> · Google Sheets · <strong>{data.length} ร้าน</strong>{lastUpdated&&<span style={{opacity:.7}}> · {lastUpdated.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span>}</span>
            <button onClick={loadData} disabled={refreshing} style={{ padding:'3px 12px',borderRadius:6,border:'1px solid rgba(90,160,90,0.5)',background:'rgba(90,160,90,0.15)',cursor:'pointer',fontSize:'.75rem',fontWeight:600,color:'var(--ink)',opacity:refreshing?0.5:1 }}>
              {refreshing?'⏳':'🔄'} {tx(lang,'รีโหลด','Reload')}
            </button>
          </div>
        )}
        <ProjectInfoSection lang={lang} />
        {list.length > 0 && <Top3Showcase lang={lang} list={list} onSel={setSel} />}
        <ScoringTableSection lang={lang} />
        <AskBox lang={lang} list={list} weights={weights} data={data} />
        {loadingData ? (
          <div style={{ textAlign:'center',padding:'60px 20px',color:'var(--muted)' }}>
            <div style={{ fontSize:'2.4rem',marginBottom:10 }}>⏳</div>
            <div style={{ fontSize:'1rem',fontWeight:600 }}>{tx(lang,'กำลังโหลดข้อมูลจาก Google Sheets…','Loading data from Google Sheets…')}</div>
          </div>
        ) : list.length === 0 ? (
          <div style={{ textAlign:'center',padding:'60px 20px',color:'var(--muted)' }}>
            <div style={{ fontSize:'2.8rem',marginBottom:12 }}>🗺️</div>
            <div style={{ fontFamily:'Playfair Display,serif',fontSize:'1.25rem',fontWeight:700,marginBottom:8,color:'var(--ink)' }}>
              {tx(lang,`ยังไม่มีข้อมูลย่านนี้`,`No data for this zone yet`)}
            </div>
            <div style={{ fontSize:'.85rem',marginBottom:20 }}>{tx(lang,'รัน n8n Workflow เพื่อดึงข้อมูลโซนนี้','Run your n8n workflow to scrape this zone')}</div>
          </div>
        ) : (
          <>
            {layout==='cards'    && <CardGrid    list={list} lang={lang} onSel={setSel} weights={weights} />}
            {layout==='table'    && <TableView   list={list} lang={lang} onSel={setSel} sort={sort} setSort={setSort} />}
            {layout==='magazine' && <MagView     list={list} lang={lang} onSel={setSel} />}
          </>
        )}
        <CompareSection lang={lang} list={list} weights={weights} />
        <HomeworkEvidence lang={lang} weights={weights} list={list} />
      </div>
      {sel && <Modal r={sel} weights={weights} lang={lang} onClose={()=>setSel(null)} />}
      <TweaksPanel>
        <TweakSection label={tx(lang,'ธีมสี','Color Theme')} />
        <TweakRadio label={tx(lang,'ธีม','Theme')} value={t.theme} options={['warm','dark','sage']} onChange={v=>setTweak('theme',v)} />
        <TweakSection label={tx(lang,'มุมมอง','Layout')} />
        <TweakRadio label={tx(lang,'วิว','View')} value={layout} options={['cards','table','magazine']} onChange={v=>setLayout(v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
